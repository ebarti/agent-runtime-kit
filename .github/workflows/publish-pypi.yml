name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  test:
    name: test (py${{ matrix.python-version }}, ${{ matrix.extras }})
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        # Re-run the full CI matrix at the release ref, not a 2-combo subset, so a
        # release cannot ship a combination that main CI would have failed.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        extras: [core, all]

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        # --locked: a release must be tested against exactly the committed lockfile.
        run: |
          if [ "${{ matrix.extras }}" = "all" ]; then
            uv sync --locked --all-extras
          else
            uv sync --locked
          fi

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest -q

  build:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          if not tag.startswith("v"):
              raise SystemExit(f"Release tag must start with 'v', got {tag!r}")

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          version = project["project"]["version"]
          if tag[1:] != version:
              raise SystemExit(
                  f"Release tag {tag!r} does not match pyproject version {version!r}"
              )
          PY

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish distributions to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/agent-runtime-kit/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to PyPI
        # Pinned to an immutable SHA (v1.14.0) instead of the moving release/v1
        # branch: this step has id-token: write, so a compromised branch retag
        # would otherwise be able to publish as us.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
