name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          if not tag.startswith("v"):
              raise SystemExit(f"Release tag must start with 'v', got {tag!r}")

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          version = project["project"]["version"]
          if tag[1:] != version:
              raise SystemExit(
                  f"Release tag {tag!r} does not match pyproject version {version!r}"
              )
          PY

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish distributions to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/agent-runtime-kit/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
