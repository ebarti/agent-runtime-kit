name: SDK Evolution Report

on:
  schedule:
    - cron: "43 5 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: uv sync --locked --all-extras

      - name: Run SDK evolution report
        run: |
          uv run python -m examples.sdk_evolution_agent \
            --runtime fake \
            --refresh-preview \
            --inspect-candidates

      - name: Locate run directory
        id: run-dir
        run: |
          latest="$(ls -td reports/sdk-evolution/* | head -1)"
          echo "path=$latest" >> "$GITHUB_OUTPUT"

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-evolution-report
          path: ${{ steps.run-dir.outputs.path }}
          retention-days: 90

      - name: Update status issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python -m examples.sdk_evolution_agent.status_issue "${{ steps.run-dir.outputs.path }}"
