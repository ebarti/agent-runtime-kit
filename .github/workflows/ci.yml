name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly, off-peak minute: exercise the latest vendor SDKs before users hit a
    # breaking upstream release (the lockfile lanes below pin what we tested against).
    - cron: "17 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }}, ${{ matrix.extras }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        extras: [core, all]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: |
          if [ "${{ matrix.extras }}" = "all" ]; then
            uv sync --all-extras
          else
            uv sync
          fi

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest -q --cov=agent_runtime_kit --cov-report=term-missing --cov-fail-under=85

  pip-floors:
    # The lockfile lanes above test pinned versions; real users get whatever pip
    # resolves within the specifiers. This lane installs with no uv.lock so an
    # unbounded/mis-bounded floor that breaks a fresh install is caught here.
    name: pip install (no lockfile)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from PyPI (no uv.lock) and run tests
        run: |
          python -m pip install --upgrade pip
          pip install ".[all]" pytest pytest-asyncio
          pytest -q

  upstream-latest:
    # Scheduled canary: upgrade the vendor SDKs past the lockfile to surface API
    # drift (the contract tests are the tripwire) before it reaches users.
    name: upstream latest vendor SDKs
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync with upgraded vendor SDKs and run tests
        run: |
          uv sync --all-extras --upgrade
          uv run pytest -q
